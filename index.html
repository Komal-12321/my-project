
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Project</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #ff6b6b;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #ff3b3b;
            transform: scale(1.05);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 Deployed Successfully!</h1>
        <p>Your website is live on AWS S3 using GitHub Actions & Python.</p>

        <button class="btn" onclick="showMessage()">Click Me</button>
    </div>

    <footer>
        © 2026 | Built with ❤️ using AWS & DevOps
    </footer>

    <script>
        function showMessage() {
            alert("🎉 Your CI/CD pipeline is working perfectly!");
        }
    </script>

</body>
</html>
